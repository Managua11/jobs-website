@if (data$ | async; as data) {
<div class="job-list">
  @for(job of data.jobs; track $index){
    @if ((job.position.toLowerCase().includes(data.filter.name.toLowerCase()) || data.filter.name === "")
    && ((job.location === 'Remote' && data.filter.location === 'Remote') || data.filter.location === 'all')){
    <app-job-card [job]="job"/>
    }
  }
</div>
}
