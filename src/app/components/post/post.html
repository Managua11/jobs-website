<div class="post">
  <div class="post__card">
    <h3 class="post__header">Create a statement</h3>

    <form #loginForm="ngForm" (ngSubmit)="onSubmit()" class="post__form">

      <!-- Position -->
      <div class="post__field">
        <label for="position">Position</label>
        <input
          id="position"
          type="text"
          name="position"
          [(ngModel)]="job.position"
          required
        />
      </div>

      <!-- Company -->
      <div class="post__field">
        <label for="company">Company</label>
        <input
          id="company"
          type="text"
          name="company"
          [(ngModel)]="job.company"
          required
        />
      </div>

      <!-- Role -->
      <div class="post__field">
        <label for="role">Role</label>
        <input
          id="role"
          type="text"
          name="role"
          [(ngModel)]="job.role"
        />
      </div>

      <!-- Level -->
      <div class="post__field">
        <label for="level">Level</label>
        <input
          id="level"
          type="text"
          name="level"
          [(ngModel)]="job.level"
        />
      </div>

      <!-- Location -->
      <div class="post__field">
        <label for="location">Location</label>
        <input
          id="location"
          type="text"
          name="location"
          [(ngModel)]="job.location"
        />
      </div>

      <!-- Contract -->
      <div class="post__field">
        <label for="contract">Contract</label>
        <input
          id="contract"
          type="text"
          name="contract"
          [(ngModel)]="job.contract"
        />
      </div>

      <!-- Posted At -->
      <div class="post__field">
        <label for="postedAt">Posted At</label>
        <input
          id="postedAt"
          type="text"
          name="postedAt"
          [(ngModel)]="job.postedAt"
        />
      </div>

      <!-- New -->
      <div class="post__field">
        <label>
          <input
            type="checkbox"
            name="new"
            [(ngModel)]="job.new"
          />
          New
        </label>
      </div>

      <!-- Featured -->
      <div class="post__field">
        <label>
          <input
            type="checkbox"
            name="featured"
            [(ngModel)]="job.featured"
          />
          Featured
        </label>
      </div>
